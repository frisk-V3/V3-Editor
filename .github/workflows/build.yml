name: Build All Platforms

on:
  push:
    branches:
      - s
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build application
        # 実行中のOSに合わせて --windows, --mac, --linux を切り替えます
        # また、署名を強制的にオフにする設定も全OS共通で入れました
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npm run dist -- --windows -c.win.sign=false
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run dist -- --mac -c.mac.identity=null
          else
            npm run dist -- --linux
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_2FA_SETTING: true 

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: ${{ github.ref_name }}
          name: Build ${{ github.ref_name }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
            dist/*.deb
            dist/*.rpm
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
